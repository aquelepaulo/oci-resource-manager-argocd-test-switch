apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-switch
  namespace: gitops-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: test-switch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: test-switch
    spec:
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: nginx-config
          configMap:
            name: test-switch-nginx
